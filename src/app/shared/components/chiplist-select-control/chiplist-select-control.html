<mat-form-field>
    <mat-label>{{ label() }}</mat-label>
    <mat-chip-grid #chipGrid [formControl]="chipControl" [errorStateMatcher]="errorStateMatcher">
      @for (item of selected(); track item) {
        <mat-chip-row (removed)="remove(item)">
          {{ item }}
          <button matChipRemove [attr.aria-label]="'remove ' + item">
            <mat-icon>cancel</mat-icon>
          </button>
        </mat-chip-row>
      }
    </mat-chip-grid>
  
    <input
      [placeholder]="placeholder()"
      [formControl]="inputControl"
      [matChipInputFor]="chipGrid"
      [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
      [matChipInputAddOnBlur]="allowFreeForm()"
      [matAutocomplete]="auto"
      (matChipInputTokenEnd)="add($event)"
      (blur)="onTouched()"
    />
  
    <mat-autocomplete #auto="matAutocomplete" (optionSelected)="selectedOption($event)">
      @for (option of filteredOptions(); track option) {
        <mat-option [value]="option">{{ option }}</mat-option>
      } @empty {
        <mat-option disabled>No matching options</mat-option>
      }
    </mat-autocomplete>
  
    @if (chipControl.hasError('required')) {
      <mat-error>{{ label() }} is required</mat-error>
    }
  </mat-form-field>
