<button
  [matButton]="appearance()"
  [type]="type()"
  [disabled]="disabled() || isLoading()"
  [class]="btnClass()"
  (click)="clickEvent.emit()"
>
  @if (isLoading()) {
    <div class="button__loading-container">
      <mat-spinner class="button__spinner" diameter="15" />
      <ng-content select="[loadingText]" />
    </div>
  } @else {
    <ng-content select="[text]" />
  }
</button>
